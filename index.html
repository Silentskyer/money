<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>靈感記帳 | 收支小帳本</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="hero-text">
          <p class="eyebrow">靈感記帳</p>
          <h1>把日常收支變得更有條理</h1>
          <p class="subtitle">
            快速記錄收入與支出，清楚掌握每個時段的金流變化。
          </p>
        </div>
        <div class="hero-card">
          <div class="stat">
            <span>全部結餘</span>
            <strong id="overall-balance">NT$ 0</strong>
          </div>
          <div class="stat">
            <span>目前篩選結餘</span>
            <strong id="period-balance">NT$ 0</strong>
          </div>
        </div>
      </header>

      <div id="status" class="status" role="alert" aria-live="polite"></div>

      <main class="content">
        <section class="panel form-panel">
          <h2>新增記帳</h2>
          <form id="entry-form">
            <label>
              項目
              <input type="text" id="item-input" placeholder="例如：早餐、車票" required />
            </label>
            <label>
              金額
              <input type="number" id="amount-input" min="0" step="1" placeholder="輸入金額" required />
            </label>
            <label>
              類型
              <div class="segmented">
                <label><input type="radio" name="type" value="income" checked />收入</label>
                <label><input type="radio" name="type" value="expense" />支出</label>
              </div>
            </label>
            <label>
              時間
              <input type="datetime-local" id="time-input" />
            </label>
            <button type="submit" class="primary">加入清單</button>
          </form>
        </section>

        <section class="panel filter-panel">
          <h2>篩選與排序</h2>
          <div class="filters">
            <label>
              年份
              <select id="year-filter"></select>
            </label>
            <label>
              月份
              <select id="month-filter"></select>
            </label>
            <label>
              關鍵字
              <input type="text" id="query-input" placeholder="輸入關鍵字" />
            </label>
            <label>
              排序
              <select id="sort-filter">
                <option value="time_desc">時間新到舊</option>
                <option value="time_asc">時間舊到新</option>
                <option value="item_asc">項目 A → Z</option>
                <option value="item_desc">項目 Z → A</option>
              </select>
            </label>
          </div>
          <div class="summary">
            <div>
              <span>篩選收入</span>
              <strong id="period-income">NT$ 0</strong>
            </div>
            <div>
              <span>篩選支出</span>
              <strong id="period-expense">NT$ 0</strong>
            </div>
            <div>
              <span>篩選結餘</span>
              <strong id="period-balance-2">NT$ 0</strong>
            </div>
          </div>
        </section>

        <section class="panel list-panel">
          <div class="list-header">
            <h2>記帳清單</h2>
            <button id="clear-btn" class="ghost">清空全部</button>
          </div>
          <div id="entry-list" class="entry-list"></div>
        </section>
      </main>
    </div>

    <script src="supabase-config.js?v=20260317-2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const statusEl = document.getElementById("status");
      if (statusEl) {
        statusEl.textContent = "JavaScript 尚未載入或發生錯誤。";
        statusEl.className = "status visible error";
      }
    </script>
    <script src="app.js?v=20260317-2"></script>
  </body>
</html>
